<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - Divino Recheio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght=300;400;500;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif !important;
        }
    </style>
</head>

<body class="bg-pink-50/50 flex items-center justify-center min-h-screen p-4 relative overflow-hidden">

    <div class="absolute -top-10 -left-10 w-40 h-40 bg-pink-200/40 rounded-full blur-xl"></div>
    <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-pink-300/30 rounded-full blur-xl"></div>

    <div
        class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-pink-100 relative z-10">

        <div
            class="bg-pink-300 text-pink-700 p-8 rounded-b-[2.5rem] shadow-lg text-center border-b-4 border-pink-200 flex flex-col items-center gap-3">
            <div
                class="relative w-24 h-24 bg-white rounded-full flex items-center justify-center p-1.5 shadow-xl border-4 border-pink-200 shrink-0">
                <img src="/static/logo.png" alt="Logo Divino Recheio" class="w-full h-full object-contain rounded-full">
            </div>
            <div>
                <h1 class="text-3xl font-black tracking-tight drop-shadow-md text-pink-700">Divino Recheio</h1>
                <p class="text-white font-extrabold text-[10px] mt-1 tracking-wider uppercase">Painel de Controle da
                    Cozinha 🔐</p>
            </div>
        </div>

        <form action="/admin/login" method="POST" class="p-8 space-y-5">
            {% if erro %}
            <div
                class="bg-red-50 border-2 border-red-100 text-red-600 text-xs font-bold p-3.5 rounded-2xl text-center shadow-inner">
                ⚠️ {{ erro }}
            </div>
            {% endif %}

            <div class="space-y-1.5">
                <label class="text-xs font-black text-gray-500 uppercase tracking-wider ml-1">Usuário</label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-4 top-4.5 text-pink-400"></i>
                    <input type="text" name="username" required autocomplete="username" placeholder="Seu usuário"
                        class="w-full p-3.5 pl-12 border-2 border-gray-100 rounded-2xl text-sm font-semibold focus:outline-none focus:border-pink-300 focus:bg-pink-100/10 transition-all text-gray-800">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-black text-gray-500 uppercase tracking-wider ml-1">Senha Secreta</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-4.5 text-pink-400"></i>
                    <input type="password" name="password" required autocomplete="current-password"
                        placeholder="••••••••"
                        class="w-full p-3.5 pl-12 border-2 border-gray-100 rounded-2xl text-sm font-semibold focus:outline-none focus:border-pink-300 focus:bg-pink-100/10 transition-all text-gray-800">
                </div>
            </div>

            <div class="pt-2">
                <button type="submit"
                    class="w-full bg-pink-500 hover:bg-pink-600 text-white font-black py-4 rounded-2xl transition-all text-xs border border-pink-600 shadow-md active:scale-95 text-center uppercase tracking-widest cursor-pointer">
                    Entrar na Cozinha 👨‍🍳
                </button>
            </div>

            <p class="text-center text-[10px] text-gray-400 font-bold uppercase tracking-wider">
                Feito com amor, recheada de sabor 💕
            </p>
        </form>
    </div>

</body>

</html>
